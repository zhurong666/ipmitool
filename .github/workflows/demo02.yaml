name: Build IPMItool for Windows

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # 允许在 GitHub Actions 页面手动触发执行

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 1. Checkout IPMItool Source
        uses: actions/checkout@v4
        with:
          repository: ipmitool/ipmitool # 自动拉取 IPMItool 官方最新源码
          path: ipmitool-source

      - name: 2. Setup Cygwin Environment
        uses: egor-tensin/setup-cygwin@v4
        with:
          platform: x64
          # 完全按照你提供的依赖列表进行自动化安装
          packages: >-
            autoconf autoconf2.5 autogen automake automake1.15 libtool make
            gcc-g++ mingw64-x86_64-gcc-core mingw64-x86_64-gcc-g++
            zlib-devel libreadline-devel libcrypt-devel openssl-devel libgcrypt-devel

      - name: 3. Configure, Build and Package
        # 关键修复 1：移除 --eo pipefail，防止 errexit 污染子脚本的编译环境
        shell: C:\tools\cygwin\bin\bash.exe --noprofile --norc '{0}'
        env:
          # 保留忽略回车符的设定
          SHELLOPTS: igncr
        run: |
          WORKSPACE_DIR=$(cygpath -u "$GITHUB_WORKSPACE" | tr -d '\r')
          cd "$WORKSPACE_DIR/ipmitool-source" || exit 1

          echo "开始配置与编译 IPMItool..."
          # 关键修复 2：采用手动捕获错误，替代全局的 set -e
          ./bootstrap || { echo "Bootstrap 失败"; exit 1; }
          ./configure --enable-intf-lanplus || { echo "Configure 失败"; exit 1; }
          make || { echo "Make 编译失败"; exit 1; }
          make install || { echo "Make install 失败"; exit 1; }

          echo "开始打包文件..."
          cd "$WORKSPACE_DIR" || exit 1
          mkdir ipmitool-pkg

          # 兼容不同版本编译后 exe 的存放位置
          if [ -f "ipmitool-source/src/.libs/ipmitool.exe" ]; then
            cp ipmitool-source/src/.libs/ipmitool.exe ipmitool-pkg/
          else
            cp ipmitool-source/src/ipmitool.exe ipmitool-pkg/
          fi

          # 提取必须的 Cygwin DLL 动态链接库
          cp /bin/cygwin1.dll ipmitool-pkg/
          cp /bin/cygcrypto*.dll ipmitool-pkg/ || true
          cp /bin/cygz.dll ipmitool-pkg/ || true
          cp /bin/cyggcc_s-*.dll ipmitool-pkg/ || true
          cp /bin/cygreadline*.dll ipmitool-pkg/ || true
          cp /bin/cygncursesw-*.dll ipmitool-pkg/ || true

          # 压缩打包
          tar -zcvf ipmitool-windows.tar.gz ipmitool-pkg/

      - name: 4. Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ipmitool-windows-build
          path: ipmitool-windows.tar.gz
          retention-days: 30 # 生成的构建产物在 GitHub 上保留 30 天